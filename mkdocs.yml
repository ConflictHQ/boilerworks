site_name: Boilerworks
site_url: https://boilerworks.dev
site_description: The CLI for boilerworks.ai — stop vibe-coding scaffolding
site_author: CONFLICT LLC
repo_url: https://github.com/ConflictHQ/boilerworks
repo_name: ConflictHQ/boilerworks

theme:
  name: material
  logo: assets/images/logo.svg
  favicon: assets/images/favicon.png
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - header.autohide
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/css/custom.css

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Configuration: getting-started/configuration.md
  - Templates:
      - Catalogue: guide/templates.md
      - Choosing a Template: guide/choosing.md
  - CLI Reference:
      - setup: cli/setup.md
      - init: cli/init.md
      - list: cli/list.md
      - bootstrap: cli/bootstrap.md
  - Contributing: contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ConflictHQ/boilerworks
    - icon: fontawesome/solid/globe
      link: https://boilerworks.ai

copyright: Copyright &copy; 2026 CONFLICT LLC
